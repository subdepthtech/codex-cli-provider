name: security

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "27 9 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Run pip-audit
        run: |
          python -m pip install pip-audit==2.10.1
          pip-audit --requirement requirements.txt

  container-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Prepare throwaway local config
        run: |
          cp .env.example .env
          mkdir -p data/secrets data/codex-home data/codex-work
          python - <<'PY'
          import pathlib
          import secrets

          pathlib.Path("data/secrets/proxy_api_key").write_text(secrets.token_urlsafe(48) + "\n", encoding="utf-8")
          PY
          chmod 600 .env
          chmod 644 data/secrets/proxy_api_key
          chmod 700 data/secrets data/codex-home data/codex-work

      - name: Build local image
        run: docker compose build

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: codex-cli-provider:local
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
